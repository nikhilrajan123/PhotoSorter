name: Build PhotoSorter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            git zip unzip wget openjdk-17-jdk \
            autoconf libtool pkg-config \
            libssl-dev libffi-dev cmake \
            ninja-build libltdl-dev zlib1g-dev

      - name: Set Java 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Android SDK command-line tools manually
        run: |
          # Download latest Android cmdline-tools (contains sdkmanager)
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
               -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools \
             ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest

          # Also create the OLD path buildozer 1.5 looks for: tools/bin/sdkmanager
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf \
            ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          # Accept all licenses
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          # Install required SDK components
          sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platforms;android-33" 2>&1 | tail -5

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Install buildozer + cython
        run: pip install --upgrade pip && pip install buildozer==1.5.0 cython==3.0.11

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v6
          restore-keys: buildozer-

      - name: Build APK
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log || true

      - name: Find APK
        if: always()
        run: |
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "None found"
          echo "=== Last 50 lines of build log ==="
          tail -50 build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSorterPro-APK
          path: "**/*.apk"
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
