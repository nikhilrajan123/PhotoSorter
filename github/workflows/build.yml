name: Build PhotoSorter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            libssl-dev libffi-dev cmake \
            ninja-build libltdl-dev zlib1g-dev

      - name: Set Java 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install buildozer
        run: pip install --upgrade pip && pip install buildozer==1.5.0 cython==3.0.11

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          printf "33b6937a2816f81cbf0f9bc3d22cd42716c50d7" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v5
          restore-keys: buildozer-

      - name: Build APK
        run: yes | buildozer -v android debug 2>&1 | tee build.log || true

      - name: Find APK
        if: always()
        run: |
          echo "=== APK files found ==="
          find . -name "*.apk" 2>/dev/null || echo "NONE"
          echo "=== Last 60 lines of build log ==="
          tail -60 build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoSorterPro-APK
          path: "**/*.apk"
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

